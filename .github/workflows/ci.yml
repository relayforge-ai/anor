name: ANOR CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  sim-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sim dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r sim/requirements-dev.txt

      - name: Python syntax check
        run: python -m compileall -q sim

      - name: Run sim tests
        env:
          PYTHONPATH: sim
        run: python -m pytest -q sim/tests

      - name: Dependency consistency
        run: python -m pip check
