name: ANOR CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  sim-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sim dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r sim/requirements-dev.txt

      - name: Python syntax check
        run: python -m compileall -q sim

      - name: Run sim tests
        env:
          PYTHONPATH: sim
        run: python -m pytest -q sim/tests

      - name: Dependency consistency
        run: python -m pip check

  pipeline-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Pipeline + webapp unit tests (offline / mock media)
        env:
          ANOR_MOCK_MEDIA: "1"
          PYTHONPATH: .
        run: |
          python -m unittest \
            pipeline.tests.test_pipeline \
            pipeline.tests.test_retry \
            pipeline.tests.test_validate \
            pipeline.tests.test_safe_fetch \
            pipeline.tests.test_image_client \
            pipeline.tests.test_cli_still \
            pipeline.tests.test_tts_client \
            webapp.tests.test_webapp \
            webapp.tests.test_security \
            webapp.tests.test_security_headers \
            webapp.tests.test_static_assets \
            webapp.tests.test_library_search \
            webapp.tests.test_video_jobs \
            webapp.tests.test_paths_and_media \
            webapp.tests.test_membership \
            webapp.tests.test_job_dedupe \
            webapp.tests.test_render_deps \
            webapp.tests.test_job_timeout \
            webapp.tests.test_queue_position \
            webapp.tests.test_running_eta \
            webapp.tests.test_http_range \
            webapp.tests.test_job_privacy \
            webapp.tests.test_render_lock \
            webapp.tests.test_health_privacy \
            webapp.tests.test_error_sanitize \
            webapp.tests.test_catalog_cache \
            webapp.tests.test_scenarios_cache \
            webapp.tests.test_scenario_payload_cache \
            webapp.tests.test_access_log \
            webapp.tests.test_request_timeout \
            scripts.tests.test_deploy_config \
            scripts.tests.test_social_drafts \
            scripts.tests.test_pipeline_docs \
            scripts.tests.test_dep_audit \
            -v

      - name: Pipeline + webapp syntax check
        run: python -m compileall -q pipeline webapp scripts

      - name: Dependency pin audit
        run: python scripts/dep_audit.py

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          python -m pip install --upgrade pip pip-audit
          python scripts/dep_audit.py --pip-audit --require-pip-audit

